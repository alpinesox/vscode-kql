name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Check extension entry point
        run: npm run check:main

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit

      - name: Inspect VSIX contents
        run: npm run list:vsix

      - name: Package VSIX
        run: npm run package:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vscode-kql-vsix
          path: vscode-kql.vsix
          if-no-files-found: error

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Semgrep
        run: |
          python -m pip install --user semgrep==1.168.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Semgrep
        run: semgrep scan --config auto --error

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install TruffleHog
        env:
          TRUFFLEHOG_VERSION: 3.95.6
          TRUFFLEHOG_LINUX_AMD64_SHA256: 1b62ea3cbc672ed5fd36e0eebb00b1fb50bbb7ee35090f42437a5852a299e16b
        run: |
          mkdir -p "$RUNNER_TEMP/trufflehog"
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz" -o "$RUNNER_TEMP/trufflehog/trufflehog.tar.gz"
          echo "${TRUFFLEHOG_LINUX_AMD64_SHA256}  $RUNNER_TEMP/trufflehog/trufflehog.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/trufflehog/trufflehog.tar.gz" -C "$RUNNER_TEMP/trufflehog" trufflehog
          chmod +x "$RUNNER_TEMP/trufflehog/trufflehog"

      - name: Run TruffleHog
        run: $RUNNER_TEMP/trufflehog/trufflehog filesystem . --exclude-paths .trufflehog-exclude --fail --no-update --results=verified
