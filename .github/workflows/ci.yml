name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Check extension entry point
        run: npm run check:main

      - name: Test
        run: npm test

      - name: Audit dependencies
        run: npm audit

      - name: Inspect VSIX contents
        run: npm run list:vsix

      - name: Package VSIX
        run: npm run package:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: vscode-kql-vsix
          path: vscode-kql.vsix
          if-no-files-found: error

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Semgrep
        run: |
          python -m pip install --user semgrep==1.168.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Semgrep
        run: semgrep scan --config auto --error

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install TruffleHog
        env:
          TRUFFLEHOG_VERSION: 3.95.6
        run: |
          mkdir -p "$RUNNER_TEMP/trufflehog"
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz" -o "$RUNNER_TEMP/trufflehog/trufflehog.tar.gz"
          tar -xzf "$RUNNER_TEMP/trufflehog/trufflehog.tar.gz" -C "$RUNNER_TEMP/trufflehog" trufflehog
          chmod +x "$RUNNER_TEMP/trufflehog/trufflehog"

      - name: Run TruffleHog
        run: $RUNNER_TEMP/trufflehog/trufflehog filesystem . --fail --no-update --results=verified
