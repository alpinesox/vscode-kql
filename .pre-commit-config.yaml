repos:
  - repo: local
    hooks:
      - id: trufflehog-verified
        name: trufflehog verified secret scan
        entry: ./.tools/bin/trufflehog.exe git file://. --fail --no-update --results=verified
        language: system
        pass_filenames: false
      - id: semgrep-auto
        name: semgrep static analysis
        entry: ./.venv/Scripts/semgrep.exe scan --config auto --error
        language: system
        pass_filenames: false
