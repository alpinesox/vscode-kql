repos:
  - repo: local
    hooks:
      - id: trufflehog-verified
        name: trufflehog verified secret scan
        entry: node scripts/security-secrets.js
        language: system
        pass_filenames: false
      - id: semgrep-auto
        name: semgrep static analysis
        entry: node scripts/security-sast.js
        language: system
        pass_filenames: false
