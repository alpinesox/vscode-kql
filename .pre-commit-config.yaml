repos:
  - repo: local
    hooks:
      - id: trufflehog-verified
        name: trufflehog verified secret scan
        entry: trufflehog git file://. --fail --only-verified
        language: system
        pass_filenames: false
      - id: semgrep-auto
        name: semgrep static analysis
        entry: semgrep scan --config auto --error
        language: system
        pass_filenames: false
